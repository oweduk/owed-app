name: Owed Orchestrator
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: write
jobs:
  run-orchestrator:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run meta-programmer
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python agents/meta_programmer.py
      - name: Wait
        run: sleep 45
      - name: Run hyperagent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python hyperagent.py
      - name: Wait
        run: sleep 45
      - name: Run ideation agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python agents/ideation_agent.py
      - name: Wait
        run: sleep 45
      - name: Run orchestrator
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python orchestrator/brain.py
      - name: Wait
        run: sleep 45
      - name: Run content agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python agents/content_agent.py
      - name: Wait
        run: sleep 45
      - name: Run debate agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python agents/debate_agent.py
      - name: Wait
        run: sleep 45
      - name: Run creative agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python agents/creative_agent.py
      - name: Wait
        run: sleep 45
      - name: Run publisher agent
        run: python agents/publisher_agent.py
      - name: Wait
        run: sleep 45
      - name: Run reflection agent (VIGIL)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python agents/reflection_agent.py
      - name: Wait
        run: sleep 45
      - name: Run site agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python agents/site_agent.py
      - name: Wait
        run: sleep 45
      - name: Run outreach agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python agents/outreach_agent.py
      - name: Wait
        run: sleep 45
      - name: Run MAS2 agent generator
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python agents/mas2_agent.py
      - name: Run workflow agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python agents/workflow_agent.py
      - name: Wait
        run: sleep 30
      - name: Run workflow auditor
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python agents/workflow_auditor.py
      - name: Wait
        run: sleep 30
      - name: Commit all outputs
        run: |
          git config user.name "Owed Orchestrator"
          git config user.email "orchestrator@owed.ai"
          git add memory/store.json blog/ agents/ agent_variants/ index.html orchestrator/brain.py hyperagent.py
          git diff --staged --quiet || git commit -m "Orchestrator cycle ${{ github.run_number }}"
          git pull --rebase origin main
          git push
