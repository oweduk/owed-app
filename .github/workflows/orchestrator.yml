name: Owed Orchestrator

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-orchestrator:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Debug secret
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "SECRET IS EMPTY"
          else
            echo "SECRET IS PRESENT"
          fi
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Run orchestrator
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python orchestrator/brain.py

      - name: Commit memory update
        run: |
          git config user.name "Owed Orchestrator"
          git config user.email "orchestrator@owed.ai"
          git add memory/store.json
          git diff --staged --quiet || git commit -m "Orchestrator cycle ${{ github.run_number }}"
          git push
