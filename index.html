    html {
      scroll-behavior: smooth;
    }

      -webkit-font-smoothing: antialiased;

    /* Navigation */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--gray-100);
      z-index: 1000;
      padding: 16px 24px;
    }
    
    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      font-size: 24px;
      font-weight: 700;
      color: var(--navy);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--mint);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .logo-icon svg {
      width: 18px;
      height: 18px;
      color: var(--white);
    }
    
    .nav-cta {
      background: var(--navy);
      color: var(--white);
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      transition: all 0.2s ease;
    }
    
    .nav-cta:hover {
      background: var(--gray-800);
      transform: translateY(-1px);
    }
    
    /* Hero Section */
    .hero {
      padding: 140px 24px 80px;
      background: linear-gradient(180deg, var(--gray-50) 0%, var(--white) 100%);
      text-align: center;
    }
    
    .hero-container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 200, 150, 0.1);
      color: var(--mint-dark);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 24px;
    }
    
    .hero-badge-dot {
      width: 8px;
      height: 8px;
      background: var(--mint);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .hero h1 {
      font-size: clamp(36px, 6vw, 60px);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 20px;
      color: var(--navy);
      letter-spacing: -0.02em;
    }
    
    .hero h1 span {
      color: var(--mint);
    }
    
    .hero-subtitle {
      font-size: clamp(18px, 2.5vw, 22px);
      color: var(--gray-600);
      max-width: 600px;
      margin: 0 auto 32px;
      line-height: 1.5;
    }
    
    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--mint);
      color: var(--white);
      padding: 16px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 18px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 14px rgba(0, 200, 150, 0.4);

    .hero-cta:hover {
      background: var(--mint-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 200, 150, 0.5);
    }
    
    .hero-cta svg {
      width: 20px;
      height: 20px;
      transition: transform 0.2s ease;
    }
    
    .hero-cta:hover svg {

      border-radius: 16px;

      text-align: center;
