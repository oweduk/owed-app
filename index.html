<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owed — Find out what the government owes you</title>
  <meta name="description" content="Check your UK benefits entitlement in 2 minutes. £24 billion goes unclaimed every year. Find out what you're owed.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    :root {
      --navy: #0F1729;
      --mint: #00C896;
      --mint-dark: #00A67D;
      --white: #FFFFFF;
      --gray-50: #F8FAFC;
      --gray-100: #F1F5F9;
      --gray-200: #E2E8F0;
      --gray-300: #CBD5E1;
      --gray-400: #94A3B8;
      --gray-500: #64748B;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1E293B;
    }
    
    html {
      scroll-behavior: smooth;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--white);
      color: var(--navy);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    /* Navigation */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--gray-100);
      z-index: 1000;
      padding: 16px 24px;
    }
    
    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      font-size: 24px;
      font-weight: 700;
      color: var(--navy);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--mint);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .logo-icon svg {
      width: 18px;
      height: 18px;
      color: var(--white);
    }
    
    .nav-cta {
      background: var(--navy);
      color: var(--white);
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      transition: all 0.2s ease;
    }
    
    .nav-cta:hover {
      background: var(--gray-800);
      transform: translateY(-1px);
    }
    
    /* Hero Section */
    .hero {
      padding: 140px 24px 80px;
      background: linear-gradient(180deg, var(--gray-50) 0%, var(--white) 100%);
      text-align: center;
    }
    
    .hero-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px;
      background: var(--white);
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    
    .hero-title {
      font-size: 48px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 16px;
    }
    
    .hero-subtitle {
      font-size: 18px;
      color: var(--gray-500);
      margin-bottom: 40px;
    }
    
    .hero-btn {
      background: var(--navy);
      color: var(--white);
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      transition: all 0.2s ease;
    }
    
    .hero-btn:hover {
      background: var(--gray-800);
      transform: translateY(-1px);
    }
    
    /* Form Section */
    .form {
      padding: 40px;
      background: var(--white);
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    
    .form-container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .form-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 16px;
    }
    
    .form-input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--gray-300);
      border-radius: 8px;
      margin-bottom: 16px;
    }
    
    .form-submit {
      background: var(--navy);
      color: var(--white);
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      transition: all 0.2s ease;
      margin-bottom: 16px;
    }
    
    .form-submit:hover {
      background: var(--gray-800);
      transform: translateY(-1px);
    }
    
    .results-card {
      background: var(--white);
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      padding: 20px;
      margin-bottom: 40px;
    }
    
    .results-content {
      font-size: 18px;
      color: var(--navy);
    }
    
    .error-message {
      font-size: 14px;
      color: var(--gray-500);
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-container">
      <a class="logo" href="#">
        <span class="logo-icon">
          <svg viewBox="0 0 32 32">
            <path d="M16 0c-8.836 0-16 7.164-16 16s7.164 16 16 16 16-7.164 16-16-7.164-16-16-16zm0 14c-3.309 0-6-2.691-6-6s2.691-6 6-6 6 2.691 6 6-2.691 6-6 6z" />
          </svg>
        </span>
        <span>Owed</span>
      </a>
      <a class="nav-cta" href="#">Get Started</a>
    </div>
  </nav>
  <section class="hero">
    <div class="hero-container">
      <h1 class="hero-title">Find out what the government owes you</h1>
      <p class="hero-subtitle">Check your UK benefits entitlement in 2 minutes. £24 billion goes unclaimed every year.</p>
      <a class="hero-btn" href="#">Get Started</a>
    </div>
  </section>
  <section class="form">
    <div class="form-container">
      <h2 class="form-title">Get Your Free Assessment</h2>
      <form>
        <input class="form-input" type="text" id="name" placeholder="Name">
        <input class="form-input" type="email" id="email" placeholder="Email">
        <input class="form-input" type="tel" id="phone" placeholder="Phone">
        <button class="form-submit" id="submitBtn">Get Started</button>
      </form>
      <div class="results-card">
        <div class="results-content">
          <p id="resultsContent"></p>
        </div>
      </div>
      <div class="error-message" id="errorMessage"></div>
    </div>
  </section>
  <footer>
    <p>&copy; 2026 Owed. All rights reserved.</p>
    <p><a href="/legal/privacy.html">Privacy Policy</a> | <a href="/legal/terms.html">Terms of Service</a> | <a href="mailto:hello@owed.co.uk">Contact</a></p>
  </footer>
  <script>
    document.getElementById('submitBtn').addEventListener('click', function() {
      // Form submission logic here
    });
  </script>
</body>
</html>
